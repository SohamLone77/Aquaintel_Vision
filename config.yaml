data:
  path: data
  img_size: 128
  # img_size: 256  # Next experiment: uncomment to test 256x256 resolution.
  #                # Monitor GPU memory; set batch_size to 4 if OOM at 8.
  validation_split: 0.2
  seed: 42              # RNG seed used by deterministic data loader split
  deterministic_mode: false  # Set true to use DeterministicDataLoader

training:
  batch_size: 8
  epochs: 50
  learning_rate: 0.0001
  early_stopping_patience: 10
  reduce_lr_patience: 5

loss:
  type: combined
  ssim_weight: 0.5

augmentation:
  enabled: true
  profile: light
  flip_prob: 0.3
  vertical_flip_prob: 0.2
  rotate_prob: 0.5
  brightness_prob: 0.3
  brightness_delta: 0.05
  contrast_prob: 0.3
  contrast_lower: 0.9
  contrast_upper: 1.1

model:
  name_prefix: unet
  checkpoint_dir: models/checkpoints
  results_dir: results
  registry_path: results/model_registry.json

logging:
  use_tensorboard: true
  use_csv_logger: true
