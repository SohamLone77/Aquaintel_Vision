data:
  path: data
  img_size: 128
  validation_split: 0.2

training:
  batch_size: 8
  epochs: 50
  learning_rate: 0.0001
  early_stopping_patience: 10
  reduce_lr_patience: 5

loss:
  type: combined
  ssim_weight: 0.5

augmentation:
  enabled: true
  profile: standard
  flip_prob: 0.5
  vertical_flip_prob: 0.5
  rotate_prob: 1.0
  brightness_prob: 0.5
  brightness_delta: 0.1
  contrast_prob: 0.5
  contrast_lower: 0.8
  contrast_upper: 1.2

model:
  name_prefix: unet
  checkpoint_dir: models/checkpoints
  results_dir: results
  registry_path: results/model_registry.json

logging:
  use_tensorboard: true
  use_csv_logger: true
